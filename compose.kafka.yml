# Local Kafka + schema registry stack for DOrc development and CI.
# Not used at runtime. See docs/kafka-migration/README-local-dev.md.
#
# Target tooling: Podman (podman compose). The Compose Specification
# file is tooling-neutral; docker compose is also compatible but Podman
# is the project standard.
#
# Images (all OSI-licensed):
#   apache/kafka:3.7.0             Apache 2.0
#   ghcr.io/aiven-open/karapace    Apache 2.0
#   provectuslabs/kafka-ui:v0.7.2  Apache 2.0
#
# Usage:
#   podman compose -f compose.kafka.yml up -d
#   podman compose -f compose.kafka.yml down -v   # full reset

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: dorc-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Two listeners: INTERNAL for container-to-container (kafka:29092), EXTERNAL for host (localhost:9092).
      # Karapace, kafka-ui, and any other compose-internal client must use INTERNAL; host-side tests use EXTERNAL.
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:${KAFKA_PORT:-9092}
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: dorc-local-cluster-01
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  karapace:
    image: ghcr.io/aiven-open/karapace:4.1.1
    container_name: dorc-karapace
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KARAPACE_PORT:-8081}:8081"
    environment:
      KARAPACE_BOOTSTRAP_URI: kafka:29092
      KARAPACE_HOST: 0.0.0.0
      KARAPACE_PORT: 8081
      KARAPACE_ADVERTISED_HOSTNAME: karapace
      KARAPACE_CLIENT_ID: karapace
      KARAPACE_GROUP_ID: karapace-registry
      KARAPACE_MASTER_ELIGIBILITY: "true"
      KARAPACE_TOPIC_NAME: _schemas
      KARAPACE_LOG_LEVEL: WARNING
      KARAPACE_COMPATIBILITY: BACKWARD
    command: ["/opt/karapace/start.sh", "registry"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8081/subjects',timeout=3); sys.exit(0 if r.status==200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: dorc-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      karapace:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: dorc-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://karapace:8081
      DYNAMIC_CONFIG_ENABLED: "true"
    profiles: ["ui"]

volumes:
  kafka-data:
